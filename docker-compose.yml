---
services:
    bluetts:
        # Alpine-based (published default); doesn't support zero-shot .wav
        # voice cloning. For that, build Dockerfile.cloning yourself and
        # point image/build at it instead -- see README.md.
        image: ghcr.io/snabb/wyoming_bluetts:latest
        container_name: bluetts
        restart: unless-stopped

    # Binds on all interfaces (0.0.0.0) by default. If Home Assistant reaches
    # this host over a VPN/tunnel, bind to that specific interface's IP
    # instead by prefixing it, e.g.:
    #     - 10.8.0.5:10200:10200/tcp
        ports:
            - 10200:10200/tcp

        volumes:
            - ./models:/data/models # persists the downloaded ONNX bundle across restarts
            - ./voices:/share/tts-voices # custom cloned-voice samples / style JSON

        environment:
            # Hebrew ("he") needs an extra ~20 MB G2P model download, so it's
            # left out here; add it (e.g. "en,es,de,it,he") if you need it.
            LANGUAGES: en,es,de,it
            DEFAULT_LANGUAGE: en
            VOICES: female1,male1
            DEBUG: 'false'
