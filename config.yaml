---
# Home Assistant App Configuration (Supervisor add-on manifest)
# https://developers.home-assistant.io/docs/add-ons/configuration
name: Wyoming BlueTTS
version: 0.2.0
slug: wyoming_bluetts
description: >-
    Fast, local, multilingual text-to-speech using the BlueTTS ONNX model
    (English, Spanish, German, Italian, Hebrew). CPU only. Models download
    automatically on first start.
url: https://github.com/snabb/wyoming_bluetts
arch:
    - amd64
    - aarch64

# Startup configuration
init: false
startup: application
boot: auto

# Auto-discovery via Wyoming protocol
discovery:
    - wyoming

# Network
ports:
    10200/tcp:
ports_description:
    10200/tcp: Wyoming protocol

# Host access
host_network: false
hassio_api: false
homeassistant_api: false

# Storage
map:
    - share:rw # For custom voice samples in /share/tts-voices

# Configuration options exposed in UI.
# Voice names go in `voices` (built-in: female1, male1, or a custom filename
# without its extension). Each listed voice is preloaded for fast first
# response and is the only set advertised to Home Assistant. Leave `voices`
# empty to fall back to advertising every built-in + custom voice (loaded on
# demand).
options:
    # Hebrew ("he") needs an extra ~20 MB G2P model download, so it's left out
    # of the default; add it to this list if you want Hebrew support.
    languages:
        - en
        - es
        - de
        - it
    default_language: en
    voices:
        - female1
    voices_dir: /share/tts-voices
    models_dir: /data/models
    debug: false

schema:
    languages:
        - list(en|es|de|it|he)
    default_language: list(en|es|de|it|he)
    voices:
        - str
    voices_dir: str
    models_dir: str
    debug: bool

# Panel
panel_icon: mdi:text-to-speech
panel_title: BlueTTS

# Documentation
# Note: Remove or comment out 'image' line for local app builds
# image: ghcr.io/snabb/wyoming-bluetts-{arch}
